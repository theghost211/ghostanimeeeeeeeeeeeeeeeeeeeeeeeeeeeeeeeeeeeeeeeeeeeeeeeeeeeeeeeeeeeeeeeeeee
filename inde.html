<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عزل الصوت</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#fff;
}

.card{
width:95%;
max-width:420px;
background:#1e293b;
padding:25px;
border-radius:20px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,.5);
}

h1{
margin-bottom:20px;
}

button{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

#start{
background:#16a34a;
color:white;
}

#stop{
background:#dc2626;
color:white;
}

#listen{
background:#2563eb;
color:white;
}

#status{
margin-top:15px;
font-size:18px;
color:#22c55e;
}

meter{
width:100%;
height:18px;
margin-top:20px;
}
</style>

</head>
<body>

<div class="card">

<h1>🎤 عزل الصوت</h1>

<button id="start">تشغيل العزل</button>

<button id="stop">إيقاف العزل</button>

<button id="listen">اسمع صوتي</button>

<meter id="level" min="0" max="100" value="0"></meter>

<div id="status">غير متصل</div>

</div>

<script>

let stream;
let context;
let source;
let analyser;
let gain;
let monitoring=false;

const status=document.getElementById("status");
const meter=document.getElementById("level");

async function start(){

try{

stream=await navigator.mediaDevices.getUserMedia({

audio:{
noiseSuppression:true,
echoCancellation:true,
autoGainControl:true
}

});

context=new AudioContext();

source=context.createMediaStreamSource(stream);

gain=context.createGain();

analyser=context.createAnalyser();

analyser.fftSize=256;

source.connect(analyser);

status.innerHTML="✅ العزل يعمل";

draw();

}catch(e){

status.innerHTML="❌ رفضت إذن الميكروفون";

}

}

function stop(){

if(stream){

stream.getTracks().forEach(t=>t.stop());

}

if(context){

context.close();

}

status.innerHTML="⛔ تم الإيقاف";

meter.value=0;

}

function listen(){

if(!stream)return;

if(!monitoring){

source.connect(gain);

gain.connect(context.destination);

monitoring=true;

status.innerHTML="🎧 تسمع صوتك";

}else{

source.disconnect();

source.connect(analyser);

monitoring=false;

status.innerHTML="🔇 توقف سماع الصوت";

}

}

function draw(){

if(!analyser)return;

const data=new Uint8Array(analyser.frequencyBinCount);

function loop(){

if(!analyser)return;

requestAnimationFrame(loop);

analyser.getByteFrequencyData(data);

let sum=0;

for(let i=0;i<data.length;i++){

sum+=data[i];

}

meter.value=sum/data.length;

}

loop();

}

document.getElementById("start").onclick=start;
document.getElementById("stop").onclick=stop;
document.getElementById("listen").onclick=listen;

</script>

</body>
</html>
